---
name: Semantic Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - '!src/backplane/__init__.py'

  workflow_dispatch:
    inputs:
      publish-tag:
        description: The tag to deploy. Will attempt a new release if omitted.
        required: false
      force-deployment:
        description: >-
          Adds the `--force` flag to the `semantic-release` command. Must be set
          to one of "prerelease", "patch", "minor", or "major".
        required: false
        type: string
env:
  PYTHON_VERSION: 3.14

jobs:
  release:
    name: Release
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    outputs:
      released: ${{ steps.python-semantic-release.outputs.released }}
      tag: ${{ steps.python-semantic-release.outputs.tag }}
      version: ${{ steps.python-semantic-release.outputs.version }}
    steps:
      - name: Log Inputs
        if: runner.debug == '1'
        env:
          INPUTS: ${{ toJson(inputs) }}
        run: echo -e "\`\`\`json\n$INPUTS\n\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Clone Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          token: ${{ secrets.WORGARSIDE_DEV_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python Semantic Release
        id: python-semantic-release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.WORGARSIDE_DEV_TOKEN }}
          git_committer_name: worgarside-dev
          git_committer_email: worgarside.dev@gmail.com
          config_file: pyproject.toml
          verbosity: 2
          force: ${{ inputs.force-deployment }}

  deploy:
    name: Deploy
    needs: release
    if: needs.release.outputs.released == 'true' || inputs.publish-tag != ''
    environment: production-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH key and known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.BACKPLANE_TAILSCALE_HOSTNAME }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ vars.DEPLOY_SSH_USER }}@${{ vars.BACKPLANE_TAILSCALE_HOSTNAME }}" \
            "cd ${{ vars.BACKPLANE_INSTALL_DIR }} && just deploy ${{ needs.release.outputs.tag || inputs.publish-tag }}"
