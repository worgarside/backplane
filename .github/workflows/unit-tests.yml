---
name: Unit Tests

on:
  workflow_dispatch:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: 3.14

jobs:
  unit-tests:
    name: Unit Tests
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv dependencies
        env:
          UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
        run: uv sync --locked --all-groups

      - name: Test
        id: test
        continue-on-error: true
        run: uv run pytest --cov=src --cov-report=xml

      - name: Check Coverage
        continue-on-error: true
        id: coverage-check
        run: |
          uv run diff-cover \
            coverage.xml \
            --fail-under=90 \
            --compare-branch=origin/${{ github.base_ref || 'main' }} \
            --markdown-report .coverage-report.md

      - name: Upload Coverage Report
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.WORGARSIDE_DEV_TOKEN }}
        # yamllint disable rule:line-length
        run: |
          [[ -f .coverage-report.md ]] || exit 0
          cat .coverage-report.md >> "${GITHUB_STEP_SUMMARY}"

          marker="<!-- backplane:coverage-report -->"
          comment_file=".coverage-comment.md"

          upsert_coverage_comment() {
            local output
            local status
            local comment_id
            local lookup_output

            set +e
            lookup_output=$(
              gh api \
                "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
                --paginate \
                --jq ".[] | select(.body | contains(\"${marker}\")) | .id" \
                2>&1
            )
            status=$?
            set -e

            if [ "${status}" -ne 0 ]; then
              echo -e "Coverage comment lookup failed: \`${lookup_output}\`" >> "${GITHUB_STEP_SUMMARY}"
              exit "${status}"
            fi

            comment_id=$(printf "%s\n" "${lookup_output}" | tail -n 1)

            jq -n --rawfile body "${comment_file}" '{body: $body}' > coverage-comment.json

            set +e
            if [[ -n "${comment_id}" ]]; then
              output=$(
                gh api \
                  --method PATCH \
                  "/repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
                  --input coverage-comment.json \
                  2>&1
              )
            else
              output=$(
                gh api \
                  --method POST \
                  "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
                  --input coverage-comment.json \
                  2>&1
              )
            fi
            status=$?
            set -e

            echo -e "Coverage comment API output: \`${output}\`" >> "${GITHUB_STEP_SUMMARY}"
            echo -e "Coverage comment API status: \`${status}\`" >> "${GITHUB_STEP_SUMMARY}"

            if [ "${status}" -ne 0 ]; then
              echo -e "Coverage comment API failed: \`${output}\`" >> "${GITHUB_STEP_SUMMARY}"
              exit "${status}"
            fi
          }

          if ! grep -zqE "No lines with coverage information in this diff" .coverage-report.md; then

            echo "There is coverage to report." >> "${GITHUB_STEP_SUMMARY}"
            echo "Commenting on PR." >> "${GITHUB_STEP_SUMMARY}"

            printf "%s\n\n" "${marker}" > "${comment_file}"
            cat .coverage-report.md >> "${comment_file}"
            upsert_coverage_comment

          else
            echo "No coverage to report." >> "${GITHUB_STEP_SUMMARY}"

            printf "%s\n\nNo coverage to report! 🙅‍♂️\n" "${marker}" > "${comment_file}"
            upsert_coverage_comment
          fi
        # yamllint enable rule:line-length

      - name: Fail for Test Failures or Low Coverage
        if: steps.test.outcome == 'failure' || steps.coverage-check.outcome == 'failure'
        run: exit 1
