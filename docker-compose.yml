services:
  api:
    build:
      context: .
      dockerfile: src/backplane/api/Dockerfile
    container_name: backplane-api
    environment:
      OBSIDIAN_VAULT_PATH: /vault
    ports:
      - "8000:8000"
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/vault
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/check', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s