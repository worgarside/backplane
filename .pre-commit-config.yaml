---
default_language_version:
  python: python3.13

default_install_hook_types:
  - commit-msg
  - pre-commit

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        language_version: python3.14
        stages:
          - commit-msg

  - repo: https://github.com/worgarside/pre-commit-hooks-dependency-sync
    rev: 1.5.1
    hooks:
      - id: sync-additional-dependencies
        args:
          - --package-manager=uv

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.25
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args:
          - --maxkb=1000
      - id: check-case-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: pretty-format-json
        args:
          - --no-sort-keys
          - --autofix
          - --indent
          - '2'
      - id: trailing-whitespace

  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args:
          - --mapping
          - '2'
          - --sequence
          - '4'
          - --offset
          - '2'
          - --width
          - '4096'

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --format
          - parsable
          - --strict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: 1.39.8
    hooks:
      - id: basedpyright
        name: basedpyright-src
        files: ^(src/|pyproject\.toml$)
        pass_filenames: false
        additional_dependencies: &basedpyright_additional_dependencies
          - aiohttp==3.14.1
          - fastmcp==3.3.1
          - loguru==0.7.3
          - markdown-it-py==4.2.0
          - mdformat==1.0.0
          - mdformat-gfm==1.0.0
          - pydantic==2.13.4
          - pydantic-ai==1.102.0
          - pydantic-settings==2.14.2
          - pytest==9.0.3
          - pytest-asyncio==1.3.0
          - pytest-mock==3.15.1
          - rapidfuzz==3.14.5
          - ruamel-yaml==0.19.1
          - uvicorn==0.46.0
          - uvloop==0.22.1
      - id: basedpyright
        name: basedpyright-tests
        args:
          - --project=basedpyright-tests.json
        files: ^(tests/|basedpyright-tests\.json$)
        pass_filenames: false
        additional_dependencies: *basedpyright_additional_dependencies

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: local
    hooks:
      - id: update-readme-mcp-catalog
        name: update README MCP catalog
        entry: uv run python -m scripts.dev.update_readme_mcp_catalog
        language: system
        pass_filenames: false
        # yamllint disable-line rule:line-length
        files: ^(src/backplane/mcp/|scripts/dev/(mcp_catalog|update_readme_mcp_catalog)\.py|scripts/fixtures/readme-vault/)
